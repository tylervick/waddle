name: BoomBox
options:
  bundleIdPrefix: com.tylervick
  deploymentTarget:
    iOS: "26.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    exactVersion: 0.9.19
settings:
  base:
    SWIFT_VERSION: "6.0"
    OTHER_LDFLAGS: "-lc++"
    TARGETED_DEVICE_FAMILY: "1,2"
    # Personal team (OU of the "Apple Development: Tyler Vick" cert) so
    # device runs sign out of the box — xcodegen regenerates the project,
    # which would wipe a team set by hand in Xcode's Signing pane.
    DEVELOPMENT_TEAM: 352UZEKYPP
    CODE_SIGN_STYLE: Automatic
targets:
  BoomBox:
    type: application
    platform: iOS
    settings:
      base:
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Document-type registration (CFBundleDocumentTypes +
    # UTImportedTypeDeclarations, needed for "Share -> Open in BoomBox" on
    # .wad files) is nested-dictionary plist content with no INFOPLIST_KEY_
    # build-setting mapping, so this target needs a real Info.plist. XcodeGen
    # writes it to App/Info.plist at `xcodegen generate` time (same lifecycle
    # as the .xcodeproj); it's gitignored alongside it.
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: BoomBox
        UILaunchScreen: {}
        # No encryption beyond what the OS provides (no HTTPS calls, no
        # crypto) — lets App Store Connect skip the export-compliance
        # question on every upload.
        ITSAppUsesNonExemptEncryption: false
        UIStatusBarHidden: true
        UIApplicationSupportsIndirectInputEvents: true
        # All orientations + no UIRequiresFullScreen: required for iPadOS 26's
        # default "Windowed Apps" multitasking style (the old landscape-only +
        # fullscreen posture rendered sideways-letterboxed there, and Xcode
        # warns UIRequiresFullScreen will soon be ignored). SDL's iOS backend
        # feeds rotation/window resizes to Woof! as resize events, so the game
        # letterboxes to whatever shape it's given.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: Doom WAD
            LSHandlerRank: Owner
            LSItemContentTypes: [com.tylervick.boombox.wad]
          - CFBundleTypeName: DeHackEd Patch
            LSHandlerRank: Owner
            LSItemContentTypes: [com.tylervick.boombox.deh]
          - CFBundleTypeName: Zip Archive
            LSHandlerRank: Alternate
            LSItemContentTypes: [public.zip-archive]
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.tylervick.boombox.wad
            UTTypeDescription: Doom WAD
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [wad]
          - UTTypeIdentifier: com.tylervick.boombox.deh
            UTTypeDescription: DeHackEd Patch
            UTTypeConformsTo: [public.data]
            UTTypeTagSpecification:
              public.filename-extension: [deh, bex]
    preBuildScripts:
      - name: Generate Build Info
        # Regenerates App/Sources/Generated/BuildInfo.generated.swift with
        # the current commit/branch/build time before every build (see
        # Scripts/generate-build-info.sh's header for why a *placeholder*
        # must also exist before the first `xcodegen generate`, or this
        # file never gets picked up at all). `outputFiles` tells Xcode this
        # phase produces that file, so it's sequenced before compilation.
        script: |
          "$SRCROOT/../Scripts/generate-build-info.sh"
        outputFiles:
          - $(SRCROOT)/Sources/Generated/BuildInfo.generated.swift
    sources:
      # Generated/BuildInfo.generated.swift is excluded from this recursive
      # scan and given its own explicit `optional: true` entry below
      # instead: XcodeGen's directory scan is a static file list snapshotted
      # at `xcodegen generate` time, so on a clean checkout (file missing --
      # it's gitignored, produced by Scripts/generate-build-info.sh) it
      # would simply not exist in the project, and the preBuildScripts
      # phase further down would then be writing into a file the compiler
      # never sees -- "no such source file" wasn't the failure mode found,
      # it silently succeeded and BuildInfo just wasn't in Compile Sources,
      # so every reference to `BuildInfo.*` failed to compile. An explicit
      # `optional: true` source entry, by contrast, always reserves a
      # Compile Sources slot for that exact path, present or not at
      # generate time -- so the pre-build script's freshly generated file
      # lands somewhere Xcode already agreed to compile. Listing it twice
      # (once from the recursive scan, once explicitly) would risk a
      # duplicate Compile Sources entry once the file exists, hence the
      # exclude here.
      - path: Sources
        excludes:
          - Generated/BuildInfo.generated.swift
      - path: Sources/Generated/BuildInfo.generated.swift
        optional: true
      # App icon (regenerate with `swift Scripts/generate-app-icon.swift`).
      - path: Assets.xcassets
      # NOTE: deliberately Resources/GameData, not Resources. A folder
      # reference whose bundle-root name is literally "Resources" makes
      # Xcode emit macOS-style Contents/Resources codesign rules
      # (`^Resources/` in _CodeSignature/CodeResources) even for an iOS
      # target. That makes codesign classify the bundle as "bundle"
      # instead of "app bundle" and CoreSimulator's installer then fails
      # with "Missing bundle ID" on `simctl install`, despite a perfectly
      # valid Info.plist. Pointing the folder reference at the GameData
      # subdirectory keeps the on-disk App/Resources/GameData/ layout
      # (Task 6/7) but lands the wads at the bundle root as GameData/*.
      - path: Resources/GameData
        type: folder
        buildPhase: resources
      # License texts surfaced by AboutView (GPL compliance). Same
      # folder-reference pattern as GameData (must NOT be named
      # "Resources"); lands in the bundle as Licenses/*.
      - path: Resources/Licenses
        type: folder
        buildPhase: resources
      # woof.pk3 must land at the bundle root (sibling of the executable,
      # NOT under GameData/): Woof! finds it via SDL_GetBasePath(), which
      # resolves to the app bundle root on iOS, and there's no argv flag
      # to redirect that search (see Scripts/build-engine.sh and
      # EngineSession.swift). A loose file reference here, rather than a
      # folder reference, copies just the file to the bundle root.
      - path: Resources/woof.pk3
        type: file
        buildPhase: resources
      # Privacy manifest (App Store requirement). App-scoped settings only
      # — scheme/tuning/debug toggles via UserDefaults (reason CA92.1); no
      # tracking, no data collection, no network. A loose file reference
      # lands it at the bundle root, where App Store Connect expects it.
      - path: PrivacyInfo.xcprivacy
        type: file
        buildPhase: resources
    dependencies:
      - framework: ../Vendor/out/WoofEngine.xcframework
        embed: false
      - package: ZIPFoundation
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: UIKit.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreMotion.framework
      - sdk: CoreHaptics.framework
      - sdk: GameController.framework
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
      - sdk: CoreBluetooth.framework
      - sdk: OpenGLES.framework
  BoomBoxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    settings:
      base:
        # xcodegen's bundle.ui-testing template doesn't imply this; without
        # it, CodeSign fails with "target does not have an Info.plist file".
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: BoomBox
  BoomBoxTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: BoomBox
schemes:
  BoomBox:
    build:
      targets:
        BoomBox: all
    test:
      targets:
        - BoomBoxTests
        - BoomBoxUITests
