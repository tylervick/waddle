name: BoomBox
options:
  bundleIdPrefix: com.tylervick
  deploymentTarget:
    iOS: "26.0"
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    exactVersion: 0.9.19
settings:
  base:
    SWIFT_VERSION: "6.0"
    OTHER_LDFLAGS: "-lc++"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  BoomBox:
    type: application
    platform: iOS
    settings:
      base:
        # No Info.plist file on disk: Xcode synthesizes it at build time
        # from these settings (standard since Xcode 13; the UITests target
        # below already works this way). Every key we need has an
        # INFOPLIST_KEY_ mapping, so a physical plist would add nothing
        # except a generated file loitering in the source tree.
        GENERATE_INFOPLIST_FILE: true
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: "1.0"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UIStatusBarHidden: true
        INFOPLIST_KEY_UIRequiresFullScreen: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: >-
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
    sources:
      - path: Sources
      # NOTE: deliberately Resources/GameData, not Resources. A folder
      # reference whose bundle-root name is literally "Resources" makes
      # Xcode emit macOS-style Contents/Resources codesign rules
      # (`^Resources/` in _CodeSignature/CodeResources) even for an iOS
      # target. That makes codesign classify the bundle as "bundle"
      # instead of "app bundle" and CoreSimulator's installer then fails
      # with "Missing bundle ID" on `simctl install`, despite a perfectly
      # valid Info.plist. Pointing the folder reference at the GameData
      # subdirectory keeps the on-disk App/Resources/GameData/ layout
      # (Task 6/7) but lands the wads at the bundle root as GameData/*.
      - path: Resources/GameData
        type: folder
        buildPhase: resources
      # woof.pk3 must land at the bundle root (sibling of the executable,
      # NOT under GameData/): Woof! finds it via SDL_GetBasePath(), which
      # resolves to the app bundle root on iOS, and there's no argv flag
      # to redirect that search (see Scripts/build-engine.sh and
      # EngineSession.swift). A loose file reference here, rather than a
      # folder reference, copies just the file to the bundle root.
      - path: Resources/woof.pk3
        type: file
        buildPhase: resources
    dependencies:
      - framework: ../Vendor/out/WoofEngine.xcframework
        embed: false
      - package: ZIPFoundation
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: UIKit.framework
      - sdk: CoreGraphics.framework
      - sdk: CoreMotion.framework
      - sdk: CoreHaptics.framework
      - sdk: GameController.framework
      - sdk: CoreAudio.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
      - sdk: CoreBluetooth.framework
      - sdk: OpenGLES.framework
  BoomBoxUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    settings:
      base:
        # xcodegen's bundle.ui-testing template doesn't imply this; without
        # it, CodeSign fails with "target does not have an Info.plist file".
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: BoomBox
  BoomBoxTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: BoomBox
schemes:
  BoomBox:
    build:
      targets:
        BoomBox: all
    test:
      targets:
        - BoomBoxTests
        - BoomBoxUITests
